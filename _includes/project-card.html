<article class="card-wrapper card mb-3">

  <div class="post-preview row g-0 flex-md-row-reverse">

    {% assign card_body_col = "12" %}

    {% if include.image %}
      <div class="col-md-5">
        <img
          src="{{ include.image | relative_url }}"
          alt="{{ include.title }}"
          loading="lazy">
      </div>

      {% assign card_body_col = "7" %}
    {% endif %}

    <div class="col-md-{{ card_body_col }}">
      <div class="card-body d-flex flex-column">

        <h2 class="card-title project-card-title my-2 mt-md-0">
          {{ include.title }}
        </h2>

        <div class="card-text content mt-0 project-card-description">
          <p>
            {{ include.description }}
          </p>
        </div>

      </div>
    </div>

  </div>

  <a class="project-card-link"
     href="{{ include.url | relative_url }}"
     aria-label="View project: {{ include.title }}"></a>

</article>
