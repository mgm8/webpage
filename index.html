<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>

    <style>
        body {
            margin: 0;
            background: #ffffff;
            color: #000000;
            font-family: "Times New Roman", serif;
            text-align: center;
        }

        .container {
            margin-top: 60px;
        }

        h1 {
            font-size: 56px;
            margin-bottom: 10px;
        }

        .bar {
            height: 8px;
            background: repeating-linear-gradient(
                45deg,
                #000 0,
                #000 12px,
                #ffd800 12px,
                #ffd800 24px
            );
            margin: 30px auto;
            width: 100%;
        }

        img {
            margin-top: 20px;
            max-width: 400px;
        }

        p {
            font-size: 24px;
            margin-top: 30px;
        }

        .footer {
            margin-top: 50px;
            font-size: 14px;
            color: #555;
        }

        blink {
            animation: blinker 1s linear infinite;
        }

        @keyframes blinker {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🚧 Under Construction 🚧</h1>

    <div class="bar"></div>

    <!-- Replace excavator.gif with your favorite animated construction GIF -->
    <img src="excavator.gif" alt="Animated excavator">

    <p>
        <blink>Please come back soon!</blink>
    </p>

    <div class="footer">
        Best viewed with Netscape Navigator 4.0 at 800×600 resolution 😄
    </div>

</div>

</body>
</html>
